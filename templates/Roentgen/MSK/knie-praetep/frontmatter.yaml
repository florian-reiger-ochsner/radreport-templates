id: HJK-MRRT-KNIE-PRAETEP
version: 1.5
status: pilot
modalitaet: Roentgen
region: Knie
indikation: Praeoperative Planung TEP bei Primaerarthrose
sprache: de
struktur: A  # kanonisch nacktes template.html + abgeleitete Demo (build-demo.js)
autoren:
  - florian-reiger-ochsner
reviewer: []
geprueft: 2026-07-01
naechste-pruefung: 2027-01-01
klassifikationen:
  - name: Kellgren-Lawrence
    quelle: "Kellgren JH, Lawrence JS. Ann Rheum Dis 1957;16:494-502"
# CPAK ist kein Template-Output/-Messgröße, sondern nachgelagerte Ableitung aus
# den Primär-Eingängen mMPTA/mLDFA (siehe README). Daher hier nicht als
# Template-Klassifikation gelistet; Quelle MacDessi 2021 bleibt unter referenzen.
messgroessen:
  - id: mmpta
    name: mMPTA (mechanical medial proximal tibial angle)
    einheit: grad
    cpak-eingang: true
  - id: mldfa
    name: mLDFA (mechanical lateral distal femoral angle)
    einheit: grad
    cpak-eingang: true
  - id: hka
    name: HKA (hip-knee-ankle angle)
    einheit: grad
    loinc: LP410789-0
  - id: mad
    name: MAD (mechanical axis deviation)
    einheit: mm
  - id: lld
    name: LLD (leg length discrepancy)
    einheit: mm
    loinc: LP35279-5
  - id: jlca
    name: JLCA (joint line convergence angle)
    einheit: grad
  - id: slope
    name: Tibialer Slope (posterior tibial slope)
    einheit: grad
referenzen:
  - "MacDessi SJ et al. Bone Joint J 2021;103-B(3):329-337"
  - "Paley D. Principles of Deformity Correction. Springer 2002"
  - "Kellgren JH, Lawrence JS. Ann Rheum Dis 1957;16:494-502"
  - "IB Lab GmbH. LAMA Conformance Statement (DICOM SR)"
ki-tools:
  - name: LAMA (IB Lab)
    status: produktiv-lizenziert
    output: DICOM SR
  - name: KOALA (IB Lab)
    status: testphase
    output: DICOM SR
standorte:
  - Herz-Jesu-Krankenhaus Wien (HJK)
loinc-codes:
  - code: LP410789-0
    description: Hip-knee-ankle angle
  - code: LP35279-5
    description: Leg length discrepancy
  - code: LP410785-8
    description: Kellgren-Lawrence score
  - code: "24650-4"
    description: Knee X-ray AP and Lateral
projektionen:
  - ap-stehend
  - seitlich
  - patella-tangential-optional
  - ganzbein-einseitig-kalibriert
  - rosenberg-optional
modi:
  - manuell
  - lama-vorbefuellt
output:
  - fliesstext
  - json
  - fhir-bundle
radlex-coverage: vollstaendig
